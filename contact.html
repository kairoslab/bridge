<!DOCTYPE html>
<!--
  CONTACT PAGE
  ------------------------------------------------------------
  By default this page shows a clickable email link — nothing to
  maintain and no third-party account needed.

  Want a real fill-in form instead? Scroll down to the comment block
  marked "OPTIONAL CONTACT FORM" and follow the instructions there.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Ginkgo Math</title>
  <meta name="description" content="Get in touch to ask a question or schedule math tutoring.">
  <link rel="stylesheet" href="styles.css">
  <!-- animated inkblot background; remove this line to disable it -->
  <script defer src="assets/blob-bg.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">Ginkgo Math ● Tutoring</a>
      <p class="tagline">Mathematics tutoring · middle school, high school &amp; early college</p>
      <nav class="site-nav">
        <a href="index.html">About</a>
        <a href="philosophy.html">Teaching Philosophy</a>
        <a href="resources.html">Resources</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>Get in Touch</h1>
      <p class="lead">
        Have a question or want to schedule a session? I'd love to hear from you.
      </p>

      <!-- ============================================================
           OPTIONAL CONTACT FORM
           ------------------------------------------------------------
           GitHub Pages can't process a form by itself, but a free
           service called Formspree can email submissions to you.

           To enable it:
           1. Make a free account at https://formspree.io
           2. Create a form; it gives you an ID like  xmyzabcd
           3. Delete the email/phone lines above if you want, then
              REMOVE the two lines that say  REMOVE-TO-ENABLE  below.
           4. Replace YOUR_FORM_ID with your real ID.
           ============================================================ -->
    
      <h2>Send a Message</h2>
      <form action="https://formspree.io/f/xrevyqdq" method="POST">
        <p><label>Your name<br><input type="text" name="name" required></label></p>
        <p><label>Your email<br><input type="email" name="email" required></label></p>
        <p><label>Message<br><textarea name="message" rows="5" required></textarea></label></p>
        <p><button type="submit">Send</button></p>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      © <span id="year">2026</span> Ginkgo Math ● Tutoring
    </div>
  </footer>

  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
